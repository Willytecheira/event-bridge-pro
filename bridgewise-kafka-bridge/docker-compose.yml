version: '3.8'

services:
  bridge-worker:
    build: .
    container_name: bridgewise-kafka-bridge
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # Optional: Internal Kafka for development/testing
  # Uncomment if you need a local internal Kafka
  # zookeeper:
  #   image: confluentinc/cp-zookeeper:7.5.0
  #   environment:
  #     ZOOKEEPER_CLIENT_PORT: 2181
  #   ports:
  #     - "2181:2181"
  #
  # kafka-internal:
  #   image: confluentinc/cp-kafka:7.5.0
  #   depends_on:
  #     - zookeeper
  #   ports:
  #     - "9092:9092"
  #   environment:
  #     KAFKA_BROKER_ID: 1
  #     KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
  #     KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-internal:9092
  #     KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
